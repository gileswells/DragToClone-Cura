name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changes since last release
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | head -1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s")
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="- No changes recorded"
          fi
          echo "$COMMITS" > changelog.txt

      - name: Build zip
        run: |
          mkdir -p dist staging/DragToClone
          # Copy plugin files into a DragToClone/ subfolder so the zip contains
          # DragToClone/plugin.json at its root, which is what Cura expects.
          rsync -a --exclude='.git' --exclude='__pycache__' --exclude='.github' \
            --exclude='.DS_Store' --exclude='dist' --exclude='staging' \
            . staging/DragToClone/
          cd staging
          zip -r "../dist/DragToClone-v${{ inputs.version }}.zip" DragToClone/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(cat changelog.txt)
          gh release create "v${{ inputs.version }}" \
            "dist/DragToClone-v${{ inputs.version }}.zip" \
            --title "v${{ inputs.version }}" \
            --notes "## What's changed

          ${NOTES}"
